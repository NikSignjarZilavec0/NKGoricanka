services:
  mongo:
    image: mongo:7
    container_name: nkgoricanka-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - nknet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nkgoricanka-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/nkgoricanka}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SITE_URL: ${SITE_URL:-http://localhost:5000}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - uploads_data:/app/server/uploads
    networks:
      - nknet

volumes:
  mongo_data:
  uploads_data:

networks:
  nknet:
    driver: bridge
